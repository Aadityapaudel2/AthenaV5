<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ request.url_for('portal-static', path='portal.css') }}" />
    <script>
      window.ATHENA_PORTAL = {
        pathPrefix: "{{ path_prefix }}",
      };
    </script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script defer src="{{ request.url_for('portal-static', path='portal.js') }}"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="title-wrap">
          <h1>Athena V5 Portal</h1>
          <div id="runtime-line" class="runtime-line">Initializing...</div>
        </div>
        <div class="user-wrap">
          <div id="user-line" class="user-line">User: unknown</div>
          <button id="logout-btn" class="btn ghost" type="button">Logout</button>
        </div>
      </header>

      <main class="main-stack">
        <section class="transcript-panel">
          <div id="transcript-scroll" class="transcript-scroll">
            <section id="transcript" class="transcript">{{ initial_transcript_html | safe }}</section>
          </div>
        </section>

        <section class="composer-panel">
          <label class="label" for="prompt-input">Message</label>
          <textarea id="prompt-input" rows="2" placeholder="Type your prompt here..."></textarea>

          <div class="attach-row">
            <input id="image-input" type="file" accept="image/*" multiple hidden />
            <button id="attach-btn" class="btn" type="button">Attach Images</button>
            <button id="clear-images-btn" class="btn" type="button">Clear Images</button>
            <div id="image-line" class="image-line">Images: none</div>
          </div>
          <div id="image-preview" class="image-preview"></div>

          <div class="btn-row">
            <button id="send-btn" class="btn primary" type="button">Send</button>
            <button id="clear-btn" class="btn" type="button">Clear</button>
          </div>

          <div id="status-box" class="status-box">Ready.</div>
        </section>
      </main>
    </div>
  </body>
</html>
